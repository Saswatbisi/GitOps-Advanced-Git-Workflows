apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orion-lms-production
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/orion-lms/codebase.git'
    targetRevision: HEAD
    path: k8s/production
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: orion-lms
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
