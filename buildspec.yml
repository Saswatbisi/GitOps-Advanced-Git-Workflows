version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - npm ci --no-audit --no-fund

  pre_build:
    commands:
      - echo "Running pre-build safety audits and lints..."
      - npm run lint || true

  build:
    commands:
      - echo "Compiling project codebase..."
      - npm run build

  post_build:
    commands:
      - echo "Running test coverage verification (Shift-Left principle)..."
      - npm run test

artifacts:
  files:
    - '**/*'
  base-directory: dist
